spring:
  application:
    name: huafu-crm-opportunity
  datasource:
    url: ${CRM_DB_URL:jdbc:postgresql://localhost:5432/huafu_crm}
    username: ${CRM_DB_USERNAME:huafu}
    password: ${CRM_DB_PASSWORD:huafu_dev_only}
  flyway:
    enabled: false
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
server:
  address: ${CRM_SERVICE_ADDRESS:127.0.0.1}
  port: 8082
mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
